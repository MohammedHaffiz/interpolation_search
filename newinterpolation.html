<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Analysis Dashboard</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

.container{
    width:70%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#2c3e50;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #999;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.result{
    margin-top:25px;
    padding:20px;
    background:#ecf0f1;
    border-radius:8px;
    display:none;
}

.progress{
    width:100%;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    height:25px;
}

.bar{
    height:25px;
    width:0%;
    background:green;
    color:white;
    text-align:center;
    line-height:25px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table th, table td{
    border:1px solid #999;
    padding:10px;
    text-align:center;
}

table th{
    background:#3498db;
    color:white;
}
</style>

</head>
<body>

<div class="container">

<h1>Student Performance Analysis</h1>

<label>Student Name</label>
<input type="text" id="name">

<label>Mathematics</label>
<input type="number" id="m1" min="0" max="100">

<label>Science</label>
<input type="number" id="m2" min="0" max="100">

<label>English</label>
<input type="number" id="m3" min="0" max="100">

<label>Computer</label>
<input type="number" id="m4" min="0" max="100">

<label>Social Science</label>
<input type="number" id="m5" min="0" max="100">

<button onclick="performance_analysis()">
Analyze Performance
</button>

<div class="result" id="result">

<h2>Performance Report</h2>

<table>

<tr>
<th>Student</th>
<td id="student"></td>
</tr>

<tr>
<th>Total Marks</th>
<td id="total"></td>
</tr>

<tr>
<th>Average</th>
<td id="average"></td>
</tr>

<tr>
<th>Percentage</th>
<td id="percentage"></td>
</tr>

<tr>
<th>Grade</th>
<td id="grade"></td>
</tr>

<tr>
<th>Status</th>
<td id="status"></td>
</tr>

</table>

<br>

<h3>Overall Performance</h3>

<div class="progress">
<div class="bar" id="bar">0%</div>
</div>

</div>

</div>

<script>

function performance_analysis(){

let name=document.getElementById("name").value;

let m1=parseFloat(document.getElementById("m1").value)||0;
let m2=parseFloat(document.getElementById("m2").value)||0;
let m3=parseFloat(document.getElementById("m3").value)||0;
let m4=parseFloat(document.getElementById("m4").value)||0;
let m5=parseFloat(document.getElementById("m5").value)||0;

let total=m1+m2+m3+m4+m5;

let average=total/5;

let percentage=(total/500)*100;

let grade;

if(percentage>=90)
grade="A+";
else if(percentage>=80)
grade="A";
else if(percentage>=70)
grade="B";
else if(percentage>=60)
grade="C";
else if(percentage>=50)
grade="D";
else
grade="F";

let status;

if(m1>=35 && m2>=35 && m3>=35 && m4>=35 && m5>=35)
status="PASS";
else
status="FAIL";

document.getElementById("student").innerHTML=name;
document.getElementById("total").innerHTML=total+" / 500";
document.getElementById("average").innerHTML=average.toFixed(2);
document.getElementById("percentage").innerHTML=percentage.toFixed(2)+"%";
document.getElementById("grade").innerHTML=grade;
document.getElementById("status").innerHTML=status;

document.getElementById("result").style.display="block";

let bar=document.getElementById("bar");

bar.style.width=percentage+"%";

bar.innerHTML=percentage.toFixed(1)+"%";

if(percentage>=80)
bar.style.background="green";
else if(percentage>=60)
bar.style.background="orange";
else
bar.style.background="red";

}

</script>

</body>
</html>
